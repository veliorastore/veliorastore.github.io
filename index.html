<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veliora | Premium Sunglasses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #ffffff; color: #1a1a1a; padding-bottom: 0; }
        a { text-decoration: none; color: inherit; }

        /* Üst Duyuru Bandı */
        .announcement-bar {
            background-color: #f9f9f9;
            color: #000;
            text-align: center;
            padding: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
        }
        .announcement-bar a { text-decoration: underline; margin-left: 5px; font-weight: 700; }

        /* Header / Navbar */
        header { 
            background: #fff; 
            border-bottom: 1px solid #f5f5f5; 
            position: sticky; top: 0; z-index: 100; 
            padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            height: 70px;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 20px; }
        header button { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: #000; position: relative; }

        .logo-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo { 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 1.5rem; font-weight: 300; letter-spacing: 10px; 
            text-transform: uppercase; color: #000; padding-left: 10px;
        }
        .cart-count { 
            position: absolute; top: -6px; right: -8px; background: #000; color: #fff; 
            font-size: 0.6rem; width: 16px; height: 16px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; 
        }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 65vh;
            background: url('https://images.unsplash.com/photo-1511499767150-a48a237f0083?q=80&w=1200') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.15);
        }
        .hero-content {
            position: relative; z-index: 2; color: #fff; padding: 0 20px;
        }
        .hero-content h2 {
            font-size: 1.4rem; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .hero-btn {
            background: #fff; color: #000; padding: 12px 35px; font-size: 0.8rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; border: none; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .hero-btn:hover { background: #000; color: #fff; }

        /* Bölüm Başlığı */
        .section-title {
            text-align: center; padding: 40px 20px 20px 20px;
            font-size: 1.1rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #000;
        }

        /* Grid Sistemi */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 10px 40px 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 30px; } }

        /* Ürün Kartı */
        .card { background: #fff; display: flex; flex-direction: column; position: relative; border-bottom: 1px solid #f5f5f5; padding-bottom: 15px; }
        .image-container { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #f7f7f7; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transition: opacity 0.4s ease; }
        .card img.img-hover { opacity: 0; }
        .card:hover img.img-main { opacity: 0; }
        .card:hover img.img-hover { opacity: 1; }
