<!-- Bu kodları mevcut index.html dosyanızdaki uygun yerlerle güncelleyebilirsiniz -->

<!-- 1. SEPET ÇEKMECESİ (SLIDE-OUT CART) HTML YAPISI -->
<!-- </body> kapanış etiketinden hemen önce ekleyin -->
<div id="cartDrawer" class="cart-drawer">
    <div class="cart-drawer-header">
        <h3>SEPETİNİZ</h3>
        <button class="close-cart-btn" onclick="toggleCart()">✕</button>
    </div>
    
    <div class="cart-drawer-body">
        <!-- Sepet boşken görünecek alan -->
        <div id="emptyCartMessage" class="empty-cart-msg">
            <p>Sepetiniz şu anda boş.</p>
        </div>
        
        <!-- Sepete eklenen ürünler dinamik olarak buraya gelecek -->
        <div id="cartItemsList" class="cart-items-list"></div>
    </div>
    
    <div class="cart-drawer-footer">
        <div class="cart-total">
            <span>TOPLAM:</span>
            <span id="cartTotalAmount">0,00 TL</span>
        </div>
        <!-- Doğrudan ödeme sayfasına uçuran hızlı buton -->
        <button class="checkout-btn" onclick="goToCheckout()">ALIŞVERİŞİ TAMAMLA</button>
    </div>
</div>
<!-- Sepet açıldığında arka planı karartan katman -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>


<!-- 2. ÜRÜN SAYFASI İÇİN KULLANIŞLI GÜVEN İKONLARI -->
<!-- Bunu ürün bilgilerinin (product-info) hemen altına yerleştirebilirsiniz -->
<div class="trust-badges">
    <div class="badge-item">🚚 <span>Aynı Gün Ücretsiz Kargo</span></div>
    <div class="badge-item">🛡️ <span>UV400 Korumalı & 2 Yıl Garantili</span></div>
    <div class="badge-item">🔄 <span>14 Gün Kolay İade ve Değişim</span></div>
</div>


<!-- 3. SEPETİ ÇALIŞTIRAN GELİŞMİŞ CSS KODLARI -->
<!-- <style> etiketlerinin içine ekleyin -->
<style>
    /* Sepet Çekmecesi Ana Gövde */
    .cart-drawer {
        position: fixed;
        top: 0;
        right: -400px; /* İlk başta ekranın sağında gizli */
        width: 400px;
        height: 100%;
        background-color: #121212;
        border-left: 1px solid #1a1a1a;
        z-index: 1000;
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    @media (max-width: 480px) {
        .cart-drawer { width: 100%; right: -100%; }
    }
    .cart-drawer.open {
        right: 0; /* Açıldığında ekrana kayarak girer */
    }

    /* Karartma Katmanı */
    .cart-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        z-index: 999;
        display: none;
        backdrop-filter: blur(3px);
    }
    .cart-overlay.open { display: block; }

    /* Başlık Alanı */
    .cart-drawer-header {
        padding: 24px;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .cart-drawer-header h3 {
        font-size: 14px;
        letter-spacing: 2px;
        font-weight: 700;
    }
    .close-cart-btn {
        background: none;
        border: none;
        color: #ffffff;
        font-size: 18px;
        cursor: pointer;
    }

    /* Sepet İçeriği */
    .cart-drawer-body {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
    }
    .empty-cart-msg {
        text-align: center;
        color: #666666;
        font-size: 13px;
        margin-top: 40px;
    }

    /* Sepet Alt Kısmı ve Buton */
    .cart-drawer-footer {
        padding: 24px;
        border-top: 1px solid #1a1a1a;
        background-color: #161616;
    }
    .cart-total {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 20px;
    }
    .checkout-btn {
        width: 100%;
        background-color: #ffffff;
        color: #000000;
        border: none;
        padding: 16px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .checkout-btn:hover { background-color: #e5e5e5; }

    /* Güven İkonları Alanı (Trust Badges) */
    .trust-badges {
        margin-top: 15px;
        border-top: 1px solid #1a1a1a;
        padding-top: 15px;
    }
    .badge-item {
        display: flex;
        align-items: center;
        font-size: 11px;
        color: #aaaaaa;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }
    .badge-item span { margin-left: 8px; }
</style>


<!-- 4. SEPETİ ANLIK ÇALIŞTIRAN JAVASCRIPT KODLARI -->
<!-- </body> etiketinden hemen önce ekleyin -->
<script>
    // Sepet durumunu tutan basit bir liste
    let cart = [];

    // Sepet çekmecesini açıp kapatan fonksiyon
    function toggleCart() {
        const drawer = document.getElementById('cartDrawer');
        const overlay = document.getElementById('cartOverlay');
        drawer.classList.toggle('open');
        overlay.classList.toggle('open');
    }

    // "Sepete Ekle" butonlarına tıklandığında çalışacak fonksiyon
    // Örn kullanım: onclick="addToCart('Veliora Dark Bold', 890)"
    function addToCart(productName, price) {
        cart.push({ name: productName, price: price });
        updateCartUI();
        toggleCart(); // Ürün eklenince sepeti sağdan otomatik açar
    }

    // Sepet arayüzünü güncelleyen fonksiyon
    function updateCartUI() {
        const listContainer = document.getElementById('cartItemsList');
        const emptyMsg = document.getElementById('emptyCartMessage');
        const totalAmountSpan = document.getElementById('cartTotalAmount');
        const cartCountStatus = document.querySelector('.icon-btn:last-child'); // Header sepet sayısı
        
        listContainer.innerHTML = '';
        
        if (cart.length === 0) {
            emptyMsg.style.display = 'block';
            totalAmountSpan.innerText = '0,00 TL';
            if(cartCountStatus) cartCountStatus.innerText = '🛒 (0)';
            return;
        }
        
        emptyMsg.style.display = 'none';
        let total = 0;
        
        cart.forEach((item, index) => {
            total += item.price;
            
            // Her ürün için şık bir satır tasarımı oluşturur
            const itemHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #1a1a1a;">
                    <div>
                        <h4 style="font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">${item.name}</h4>
                        <span style="font-size: 12px; color: #888888;">${item.price.toLocaleString('tr-TR')} TL</span>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background: none; border: none; color: #ff3b30; cursor: pointer; font-size: 11px;">Kaldır</button>
                </div>
            `;
            listContainer.innerHTML += itemHTML;
        });
        
        totalAmountSpan.innerText = total.toLocaleString('tr-TR') + ' TL';
        if(cartCountStatus) cartCountStatus.innerText = `🛒 (${cart.length})`;
    }

    // Sepetten ürün silme
    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    // Alışverişi tamamla buton aksiyonu (İleride buraya Shopier veya ödeme linki gelecek)
    function goToCheckout() {
        if(cart.length === 0) {
            alert("Sepetiniz boş!");
            return;
        }
        alert("Ödeme adımına yönlendiriliyorsunuz...");
        // window.location.href = "SHOPIER_LINKINIZ";
    }
</script>
